services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: food-app-backend
    ports:
      - "4000:4000"
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: food-app-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: food-app-admin
    ports:
      - "5174:80"
    depends_on:
      - backend
    restart: unless-stopped
